<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Optimisation Stratégique de l'Atelier Industriel</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0a0a1a;
  color: #fff;
  overflow: hidden;
}

/* CONTAINER */
.presentation {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* SLIDES */
.slide {
  display: none;
  width: 100%;
  height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
  padding: 60px 80px;
  animation: fadeIn 0.5s ease;
}

.slide.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* COVER */
.slide-cover {
  background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 50%, #0d1b2a 100%);
  align-items: center;
  text-align: center;
}

.slide-cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(0,150,255,0.15), transparent 60%),
    radial-gradient(ellipse at 70% 50%, rgba(255,140,0,0.1), transparent 60%);
}

.cover-badge {
  background: linear-gradient(90deg, #ff8c00, #e63946);
  padding: 6px 22px;
  border-radius: 20px;
  margin-bottom: 30px;
  font-size: 0.85rem;
  font-weight: 700;
}

.cover-title {
  font-size: 3.2rem;
  font-weight: 900;
  margin-bottom: 16px;
}

.cover-title span {
  color: #ff8c00;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  background: rgba(0,0,0,0.6);
  padding: 10px 20px;
  border-radius: 50px;
}

.nav-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
}

/* PROGRESS */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, #ff8c00, #e63946);
}

</style>
</head>

<body>

<div class="progress-bar" id="progressBar"></div>

<div class="presentation">

  <!-- SLIDE 1 -->
  <div class="slide slide-cover active" data-slide="1">
    <div class="cover-badge">Version Final Pro</div>

    <h1 class="cover-title">
      Optimisation <span>Stratégique</span><br>
      de l'Atelier Industriel
    </h1>

    <p class="cover-sub">
      Proposition de Design et Flux Opérationnel
    </p>

    <div class="cover-author">
      Présenté par <strong>Ous</strong> · Avril 2026
    </div>
  </div>

</div>

<!-- NAVIGATION -->
<div class="nav">
  <button class="nav-btn" onclick="changeSlide(-1)">◀</button>
  <div id="dots"></div>
  <span id="counter">1 / 7</span>
  <button class="nav-btn" onclick="changeSlide(1)">▶</button>
</div>

<script>

/* VARIABLES */
const slides = document.querySelectorAll('.slide');
const dotsContainer = document.getElementById('dots');
const counter = document.getElementById('counter');
const progressBar = document.getElementById('progressBar');

let current = 0;

/* DOTS */
slides.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  dotsContainer.appendChild(dot);
});

/* FUNCTIONS */
function goTo(n) {
  slides[current].classList.remove('active');
  document.querySelectorAll('.dot')[current].classList.remove('active');

  current = (n + slides.length) % slides.length;

  slides[current].classList.add('active');
  document.querySelectorAll('.dot')[current].classList.add('active');

  counter.textContent = (current + 1) + ' / ' + slides.length;
  progressBar.style.width = ((current + 1) / slides.length * 100) + '%';
}

function changeSlide(dir) {
  goTo(current + dir);
}

/* KEYBOARD */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') changeSlide(1);
  if (e.key === 'ArrowLeft') changeSlide(-1);
});

/* INIT */
progressBar.style.width = (1 / slides.length * 100) + '%';

</script>

</body>
</html>
